eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port:8083}
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8889/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

custom:
  topic:
    alquiler:
      registro: topic-alquiler-registro
      validacion: topic-vehiculo-alquiler-validacion
  group:
    alquiler-validacion: group-alquiler-validacion
    
  kafka:
    consumer:
      alquiler-validacion-enabled: true