server:
  port: 8083

spring:
  application:
    name: ms-negocio-gestion-alquileres

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/alquiler_db
    username: db_ms_alquiler
    password: 123456

  data:
    mongodb:
      database: kafka_messages
      username: root
      password: example
      host: localhost
      port: 27017
      authentication-database: admin
      auto-index-creation: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  boot:
    admin:
      client:
        url: http://localhost:8890
        instance:
          management-base-url: http://localhost:${server.port:8083}
  kafka:
    bootstrap-servers: localhost:9092
  
  mail:
